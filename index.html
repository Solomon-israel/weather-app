<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Weather app</title>
  </head>
  <body>
    <div class="container">
      <section class="hero-section">
        <div class="hero">
          <div class="logoContainer">
            <img src="./assets/images/logo.svg" alt="" />
          </div>

          <div class="unitSection">
            <div class="unit-icon">
              <img src="./assets/images/favicon-32x32.png" alt="" />
            </div>
            <span>Units</span>
          </div>
        </div>

        <h1>How's the sky looking today?</h1>
      </section>

      <section class="search">
        <input type="text" placeholder="Search for a place..." />
        <button>Search</button>
      </section>

      <section class="banner">
        <div class="banner-image">
          <img src="./assets/images/bg-today-small.svg" alt="" />
        </div>
        <div class="banner-text">
          <h2>Berlin Germany</h2>
          <span>Tuesday,Aug 5,2025</span>
        </div>

        <!-- <div class="weatherDegreeContainer"> -->
        <div class="weatherDegree">
          <div class="weatherDegreeIcon">
            <img src="./assets/images/icon-sunny.webp" alt="" />
          </div>
          <span>20 &deg;</span>
        </div>
        <!-- </div> -->
      </section>

      <section class="about-day">
        <div class="about-day-cards">
          <div class="card">
            <p>Feels Like</p>
            <span>64 &deg;</span>
          </div>
          <div class="card">
            <p>Humity</p>
            <span>46%</span>
          </div>
          <div class="card">
            <p>Wind</p>
            <span>9 mph</span>
          </div>
          <div class="card">
            <p>Precipitation</p>
            <span>0 in</span>
          </div>
        </div>
      </section>

      <section class="weather-forecast">
        <p>Hourly Forecast</p>
        <div class="forecast-card-container">
          <div class="forecast-card">
            <p>Tue</p>
            <div class="forecast-icon">
              <img src="./assets/images/icon-rain.webp" alt="" />
            </div>
            <div class="degree">
              <p>68</p>
              <p>57</p>
            </div>
          </div>
          <div class="forecast-card">
            <p>Tue</p>
            <div class="forecast-icon">
              <img src="./assets/images/icon-rain.webp" alt="" />
            </div>
            <div class="degree">

            </div>
          </div>
          <div class="forecast-card">

            </div>
            <div class="degree">
              <p>68</p>

            </div>
          </div>
          <div class="forecast-card">
            <p>Tue</p>

              <img src="./assets/images/icon-rain.webp" alt="" />
            </div>
            <div class="degree">
              <p>68</p>
              <p>57</p>
            </div>
          </div>
          <div class="forecast-card">
            <p>Tue</p>

              <img src="./assets/images/icon-rain.webp" alt="" />
            </div>
            <div class="degree">
              <p>68</p>

            </div>
          </div>
          <div class="forecast-card">

            </div>

          </div>

        </div>
      </section>
    </div>
  </body>
</html>
