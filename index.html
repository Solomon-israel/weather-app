<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Weather app</title>
  </head>
  <body>
    <div class="container">
      <section class="hero-section">
        <div class="hero">
          <div class="logoContainer">
            <img src="./assets/images/logo.svg" alt="" />
          </div>

          <div class="unitSection">
            <div class="unitIcon">
              <img src="./assets/images/favicon-32x32.png" alt="" />
            </div>
            <span>Units</span>
          </div>
        </div>

        <h1>How's the sky looking today?</h1>
      </section>

      <section class="search">
        <input type="text" placeholder="Search for a place..." />
        <button>Search</button>
      </section>

      <section class="banner">
        <div class="banner-image">
          <img src="./assets/images/bg-today-small.svg" alt="" />
        </div>
        <div class="banner-text">
          <h2>Berlin Germany</h2>
          <span>Tuesday,Aug 5,2025</span>
        </div>

        <!-- <div class="weatherDegreeContainer"> -->
        <div class="weatherDegree">
          <div class="weatherDegreeIcon">
            <img src="./assets/images/icon-sunny.webp" alt="" />
          </div>
          <span>20</span>
        </div>
        <!-- </div> -->
      </section>

      <section class="aboutDay">
        <div class="aboutDayCards">
          <div class="aboutDayText">
            <p>Feels Like</p>
            <span>18</span>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
